services:
  fluxmail:
    build: .
    ports:
      - "8977:8977"
      # Loopback OAuth callback used by `fluxmail accounts add gmail` (docker compose exec).
      - "127.0.0.1:8976:8976"
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FLUXMAIL_OAUTH_HOST: 0.0.0.0
      # Optional overrides:
      # FLUXMAIL_BASE_URL: https://fluxmail.example.com
      # FLUXMAIL_ENCRYPTION_KEY: <64 hex chars; autogenerated into the volume if unset>
      # FLUXMAIL_AUTH: apikey
    volumes:
      - fluxmail-data:/data
    restart: unless-stopped

volumes:
  fluxmail-data:
